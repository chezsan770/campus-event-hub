spring.application.name=backend_event_hub

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/event_hub}
spring.datasource.username=${DATABASE_USERNAME:chezsan}
spring.datasource.password=${DATABASE_PASSWORD:0000}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=${SERVER_PORT:8080}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174}
google.client-id=${GOOGLE_CLIENT_ID:249163883267-m4og3b7h25j4iv6bplr64mpe0jqa5nrg.apps.googleusercontent.com}
app.upload.dir=${UPLOAD_DIR:uploads}
